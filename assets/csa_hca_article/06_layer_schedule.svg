<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560">
  <defs>
    <style>
      text{font-family:Arial,"Noto Sans SC","Microsoft YaHei",sans-serif;fill:#18202a}
      .title{font-size:28px;font-weight:700}
      .sub{font-size:16px;fill:#52616f}
      .small{font-size:14px;fill:#5b6670}
      .none{fill:#eef3f7;stroke:#73808c}
      .csa{fill:#fff2da;stroke:#d08a18}
      .hca{fill:#eaf4ff;stroke:#2f7cc0}
      .box{stroke-width:2;rx:8}
      .legend{fill:#fff;stroke:#c7d0d8;stroke-width:2;rx:8}
    </style>
  </defs>
  <rect width="1120" height="560" fill="#fbfcfe"/>
  <text x="56" y="56" class="title">Hybrid Attention 层间分工：CSA 与 HCA 交替</text>
  <text x="56" y="84" class="sub">Flash 配置：前两层和最后一层不压缩，中间大体按 4 / 128 交替。</text>

  <g transform="translate(64,150)">
    <rect x="0" y="0" width="82" height="78" class="box none"/>
    <text x="41" y="32" text-anchor="middle" font-size="16" font-weight="700">L0</text>
    <text x="41" y="56" text-anchor="middle" class="small">0</text>
    <rect x="92" y="0" width="82" height="78" class="box none"/>
    <text x="133" y="32" text-anchor="middle" font-size="16" font-weight="700">L1</text>
    <text x="133" y="56" text-anchor="middle" class="small">0</text>
    <rect x="184" y="0" width="82" height="78" class="box csa"/>
    <text x="225" y="32" text-anchor="middle" font-size="16" font-weight="700">L2</text>
    <text x="225" y="56" text-anchor="middle" class="small">CSA 4</text>
    <rect x="276" y="0" width="82" height="78" class="box hca"/>
    <text x="317" y="32" text-anchor="middle" font-size="16" font-weight="700">L3</text>
    <text x="317" y="56" text-anchor="middle" class="small">HCA 128</text>
    <rect x="368" y="0" width="82" height="78" class="box csa"/>
    <text x="409" y="32" text-anchor="middle" font-size="16" font-weight="700">L4</text>
    <text x="409" y="56" text-anchor="middle" class="small">CSA 4</text>
    <rect x="460" y="0" width="82" height="78" class="box hca"/>
    <text x="501" y="32" text-anchor="middle" font-size="16" font-weight="700">L5</text>
    <text x="501" y="56" text-anchor="middle" class="small">HCA 128</text>
    <text x="598" y="44" text-anchor="middle" font-size="28" fill="#73808c">...</text>
    <rect x="654" y="0" width="82" height="78" class="box csa"/>
    <text x="695" y="32" text-anchor="middle" font-size="16" font-weight="700">L40</text>
    <text x="695" y="56" text-anchor="middle" class="small">CSA 4</text>
    <rect x="746" y="0" width="82" height="78" class="box hca"/>
    <text x="787" y="32" text-anchor="middle" font-size="16" font-weight="700">L41</text>
    <text x="787" y="56" text-anchor="middle" class="small">HCA 128</text>
    <rect x="838" y="0" width="82" height="78" class="box csa"/>
    <text x="879" y="32" text-anchor="middle" font-size="16" font-weight="700">L42</text>
    <text x="879" y="56" text-anchor="middle" class="small">CSA 4</text>
    <rect x="930" y="0" width="82" height="78" class="box none"/>
    <text x="971" y="32" text-anchor="middle" font-size="16" font-weight="700">L43</text>
    <text x="971" y="56" text-anchor="middle" class="small">0</text>
  </g>

  <rect x="170" y="318" width="780" height="112" class="legend"/>
  <rect x="214" y="350" width="28" height="28" class="none"/>
  <text x="258" y="370" class="small">0：不压缩层，保留完整局部建模路径</text>
  <rect x="214" y="390" width="28" height="28" class="csa"/>
  <text x="258" y="410" class="small">4：CSA，较轻压缩 + learned top-k，负责较细粒度长程检索</text>
  <rect x="642" y="390" width="28" height="28" class="hca"/>
  <text x="686" y="410" class="small">128：HCA，重压缩 + compressed dense attention，负责全局覆盖</text>
</svg>
