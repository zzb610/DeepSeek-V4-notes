<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560">
  <defs>
    <style>
      text{font-family:Arial,"Noto Sans SC","Microsoft YaHei",sans-serif;fill:#18202a}
      .title{font-size:28px;font-weight:700}
      .sub{font-size:16px;fill:#52616f}
      .box{fill:#fff;stroke:#bcc8d2;stroke-width:2;rx:8}
      .h{font-size:20px;font-weight:700}
      .small{font-size:14px;fill:#5b6670}
      .mha{fill:#eef3f7;stroke:#73808c}
      .mqa{fill:#eaf4ff;stroke:#2f7cc0}
      .mla{fill:#e9f8ef;stroke:#35a567}
      .dsa{fill:#fff2da;stroke:#d08a18}
      .csa{fill:#f2edff;stroke:#7a5ac8}
      .arrow{stroke:#506070;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#506070"/>
    </marker>
  </defs>
  <rect width="1120" height="560" fill="#fbfcfe"/>
  <text x="56" y="56" class="title">Attention 压缩路线：压缩的不是同一个维度</text>
  <text x="56" y="84" class="sub">从 head 维、表示维、访问位置，到 DeepSeek-V4 的 sequence/block KV 压缩。</text>

  <g transform="translate(60,150)">
    <rect width="178" height="240" class="box mha"/>
    <text x="89" y="42" text-anchor="middle" class="h">MHA</text>
    <text x="89" y="78" text-anchor="middle" class="small">K,V: [n,h,d]</text>
    <text x="89" y="118" text-anchor="middle" class="small">每个 head</text>
    <text x="89" y="142" text-anchor="middle" class="small">独立 K/V</text>
    <text x="89" y="198" text-anchor="middle" class="small">成本高</text>
  </g>
  <path class="arrow" d="M248 270 H318"/>
  <g transform="translate(330,150)">
    <rect width="178" height="240" class="box mqa"/>
    <text x="89" y="42" text-anchor="middle" class="h">MQA/GQA</text>
    <text x="89" y="78" text-anchor="middle" class="small">K,V: [n,g,d]</text>
    <text x="89" y="118" text-anchor="middle" class="small">压缩</text>
    <text x="89" y="142" text-anchor="middle" class="small">KV head 维</text>
    <text x="89" y="198" text-anchor="middle" class="small">seq 仍为 n</text>
  </g>
  <path class="arrow" d="M518 270 H588"/>
  <g transform="translate(600,150)">
    <rect width="178" height="240" class="box mla"/>
    <text x="89" y="42" text-anchor="middle" class="h">MLA</text>
    <text x="89" y="78" text-anchor="middle" class="small">C: [n,d_latent]</text>
    <text x="89" y="118" text-anchor="middle" class="small">压缩</text>
    <text x="89" y="142" text-anchor="middle" class="small">表示维度</text>
    <text x="89" y="198" text-anchor="middle" class="small">每 token 更窄</text>
  </g>
  <path class="arrow" d="M788 270 H858"/>
  <g transform="translate(870,150)">
    <rect width="178" height="240" class="box dsa"/>
    <text x="89" y="42" text-anchor="middle" class="h">DSA</text>
    <text x="89" y="78" text-anchor="middle" class="small">top-k positions</text>
    <text x="89" y="118" text-anchor="middle" class="small">压缩</text>
    <text x="89" y="142" text-anchor="middle" class="small">访问位置</text>
    <text x="89" y="198" text-anchor="middle" class="small">少看历史</text>
  </g>

  <rect x="260" y="430" width="600" height="78" class="box csa"/>
  <text x="560" y="462" text-anchor="middle" font-size="20" font-weight="700">CSA / HCA</text>
  <text x="560" y="492" text-anchor="middle" class="small">sequence/block 维度压缩：KV entries 从 n 变成 n/m 或 n/m'</text>
</svg>
