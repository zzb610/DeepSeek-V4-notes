<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520">
  <defs>
    <style>
      text{font-family:Arial,"Noto Sans SC","Microsoft YaHei",sans-serif;fill:#18202a}
      .title{font-size:28px;font-weight:700}
      .sub{font-size:16px;fill:#52616f}
      .box{fill:#ffffff;stroke:#9aa8b5;stroke-width:2;rx:8}
      .main{fill:#eaf4ff;stroke:#2f7cc0}
      .attn{fill:#fff2da;stroke:#d08a18}
      .moe{fill:#e9f8ef;stroke:#35a567}
      .mhc{fill:#f2edff;stroke:#7a5ac8}
      .line{stroke:#506070;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .small{font-size:14px;fill:#5b6670}
      .pill{fill:#f6f8fa;stroke:#c9d2da;rx:18}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#506070"/>
    </marker>
  </defs>
  <rect width="1120" height="520" fill="#fbfcfe"/>
  <text x="56" y="56" class="title">DeepSeek-V4 架构总览：本文聚焦 Attention 子层</text>
  <text x="56" y="84" class="sub">Pro / Flash 都支持 1M context；CSA 与 HCA 是 Hybrid Attention 中的长上下文效率设计。</text>

  <rect x="70" y="190" width="150" height="86" class="box"/>
  <text x="145" y="226" text-anchor="middle" font-size="18" font-weight="700">Token</text>
  <text x="145" y="252" text-anchor="middle" class="small">Embedding</text>

  <rect x="300" y="140" width="520" height="190" class="box main"/>
  <text x="560" y="170" text-anchor="middle" font-size="20" font-weight="700">Transformer Block x N</text>
  <rect x="330" y="205" width="190" height="74" class="box attn"/>
  <text x="425" y="234" text-anchor="middle" font-size="17" font-weight="700">Hybrid Attention</text>
  <text x="425" y="258" text-anchor="middle" class="small">CSA / HCA</text>

  <rect x="590" y="205" width="190" height="74" class="box moe"/>
  <text x="685" y="234" text-anchor="middle" font-size="17" font-weight="700">DeepSeekMoE</text>
  <text x="685" y="258" text-anchor="middle" class="small">routed + shared experts</text>

  <rect x="462" y="342" width="196" height="62" class="box mhc"/>
  <text x="560" y="368" text-anchor="middle" font-size="16" font-weight="700">mHC</text>
  <text x="560" y="390" text-anchor="middle" class="small">residual enhancement</text>

  <rect x="900" y="190" width="150" height="86" class="box"/>
  <text x="975" y="226" text-anchor="middle" font-size="18" font-weight="700">Prediction</text>
  <text x="975" y="252" text-anchor="middle" class="small">Head</text>

  <path class="line" d="M220 233 H300"/>
  <path class="line" d="M820 233 H900"/>
  <path class="line" d="M425 279 C425 318 486 326 522 342"/>
  <path class="line" d="M685 279 C685 318 634 326 598 342"/>

  <rect x="74" y="420" width="292" height="42" class="pill"/>
  <text x="220" y="447" text-anchor="middle" font-size="15">Hybrid Attention = 本文主线</text>
  <rect x="402" y="420" width="292" height="42" class="pill"/>
  <text x="548" y="447" text-anchor="middle" font-size="15">HCA 是 Attention，不是 mHC</text>
  <rect x="730" y="420" width="292" height="42" class="pill"/>
  <text x="876" y="447" text-anchor="middle" font-size="15">目标：降低 FLOPs 与 KV cache</text>
</svg>
