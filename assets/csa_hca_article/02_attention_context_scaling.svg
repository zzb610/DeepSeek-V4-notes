<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
<rect width="900" height="500" fill="#ffffff"/>
<style>
text{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#172033}.title{font-size:23px;font-weight:700}.sub{font-size:13px;fill:#5d6678}.hdr{font-size:14px;font-weight:700}.cell{font-size:14px}.small{font-size:12px;fill:#667085}.box{fill:#f8fafc;stroke:#d8dee9;stroke-width:1}.head{fill:#edf3ff}.line{stroke:#d8dee9;stroke-width:1}.hot{fill:#fee4e2}.hot2{fill:#fecdca}.blue{fill:#dbeafe}.blue2{fill:#bfdbfe}.bold{font-weight:700}
</style>
<text x="34" y="38" class="title">上下文长度对 Attention FLOPs 与 KV Cache 显存占比的影响</text>
<text x="34" y="64" class="sub">估算对象：DeepSeek-V4-Flash，batch size=1，4-way tensor parallel，4×80GB GPU 汇总显存。</text>
<rect x="34" y="94" width="790" height="248" rx="8" class="box"/>
<rect x="34" y="94" width="790" height="48" rx="8" class="head"/>
<rect x="34" y="118" width="790" height="24" class="head"/>
<text x="46" y="124" class="hdr">Context</text>
<text x="146" y="124" class="hdr">Attention FLOPs</text>
<text x="316" y="124" class="hdr">Attention 占比</text>
<text x="496" y="124" class="hdr">KV Cache</text>
<text x="656" y="124" class="hdr">KV 显存占比</text>
<line x1="34" y1="142" x2="824" y2="142" class="line"/>
<text x="46" y="173" class="cell bold">4K</text>
<text x="146" y="173" class="cell">0.02 TFLOPs</text>
<text x="316" y="173" class="cell">47.0%</text>
<text x="496" y="173" class="cell">0.18 GB</text>
<text x="656" y="173" class="cell">0.06%</text>
<line x1="34" y1="192" x2="824" y2="192" class="line"/>
<text x="46" y="223" class="cell bold">32K</text>
<text x="146" y="223" class="cell">0.18 TFLOPs</text>
<text x="316" y="223" class="cell">87.7%</text>
<text x="496" y="223" class="cell">1.44 GB</text>
<text x="656" y="223" class="cell">0.47%</text>
<rect x="304" y="242" width="180" height="50" class="hot"/>
<rect x="644" y="242" width="180" height="50" class="blue"/>
<line x1="34" y1="242" x2="824" y2="242" class="line"/>
<text x="46" y="273" class="cell bold">128K</text>
<text x="146" y="273" class="cell">0.74 TFLOPs</text>
<text x="316" y="273" class="cell">96.6%</text>
<text x="496" y="273" class="cell">5.77 GB</text>
<text x="656" y="273" class="cell">1.86%</text>
<rect x="134" y="292" width="170" height="50" class="hot2"/>
<rect x="304" y="292" width="180" height="50" class="hot2"/>
<rect x="484" y="292" width="160" height="50" class="blue2"/>
<rect x="644" y="292" width="180" height="50" class="blue2"/>
<line x1="34" y1="292" x2="824" y2="292" class="line"/>
<text x="46" y="323" class="cell bold">1M</text>
<text x="146" y="323" class="cell bold">5.91 TFLOPs</text>
<text x="316" y="323" class="cell bold">99.6%</text>
<text x="496" y="323" class="cell bold">46.17 GB</text>
<text x="656" y="323" class="cell bold">13.19%</text>
<line x1="134" y1="94" x2="134" y2="342" class="line"/>
<line x1="304" y1="94" x2="304" y2="342" class="line"/>
<line x1="484" y1="94" x2="484" y2="342" class="line"/>
<line x1="644" y1="94" x2="644" y2="342" class="line"/>
<rect x="34" y="345" width="790" height="116" rx="8" fill="#fbfcff" stroke="#d8dee9"/>
<text x="56" y="372" class="hdr">分母定义与假设</text>
<text x="56" y="397" class="small">Attention 占比 = attention FLOPs / (2 × activated params + attention FLOPs)，activated params=13B。</text>
<text x="56" y="420" class="small">KV 显存占比 = KV cache / (权重 + 激活/工作区 + KV cache)，权重按 FP8 等效 284GB，激活/工作区按 20GB。</text>
<text x="56" y="443" class="small">数值是 full attention 量级估算，不是 profiling；实际占比会随并行切分、batch、精度和 kernel 实现变化。</text>
</svg>