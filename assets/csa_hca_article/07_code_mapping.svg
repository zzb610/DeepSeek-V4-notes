<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620">
  <defs>
    <style>
      text{font-family:Arial,"Noto Sans SC","Microsoft YaHei",sans-serif;fill:#18202a}
      .title{font-size:28px;font-weight:700}
      .sub{font-size:16px;fill:#52616f}
      .box{fill:#fff;stroke:#bcc8d2;stroke-width:2;rx:8}
      .code{fill:#f6f8fa;stroke:#96a3af}
      .concept{fill:#eaf4ff;stroke:#2f7cc0}
      .kernel{fill:#fff2da;stroke:#d08a18}
      .line{stroke:#506070;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .small{font-size:14px;fill:#5b6670}
      .mono{font-family:Menlo,Consolas,monospace;font-size:15px}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#506070"/>
    </marker>
  </defs>
  <rect width="1120" height="620" fill="#fbfcfe"/>
  <text x="56" y="56" class="title">从论文概念到 inference 代码</text>
  <text x="56" y="84" class="sub">按数据流看 Compressor、Indexer、Attention.forward 与 sparse_attn 的角色。</text>

  <rect x="70" y="140" width="240" height="98" class="box concept"/>
  <text x="190" y="172" text-anchor="middle" font-size="18" font-weight="700">config.json</text>
  <text x="190" y="198" text-anchor="middle" class="small">compress_ratios</text>
  <text x="190" y="220" text-anchor="middle" class="small">sliding_window / index_topk</text>

  <rect x="420" y="120" width="260" height="116" class="box code"/>
  <text x="550" y="154" text-anchor="middle" font-size="18" font-weight="700">Compressor</text>
  <text x="550" y="182" text-anchor="middle" class="mono">wkv / wgate / ape</text>
  <text x="550" y="208" text-anchor="middle" class="small">learned gated pooling</text>

  <rect x="794" y="120" width="250" height="116" class="box code"/>
  <text x="919" y="154" text-anchor="middle" font-size="18" font-weight="700">Indexer</text>
  <text x="919" y="182" text-anchor="middle" class="mono">ratio == 4</text>
  <text x="919" y="208" text-anchor="middle" class="small">score + top-k compressed blocks</text>

  <rect x="242" y="330" width="284" height="122" class="box code"/>
  <text x="384" y="364" text-anchor="middle" font-size="18" font-weight="700">Attention.forward</text>
  <text x="384" y="392" text-anchor="middle" class="small">window indexes</text>
  <text x="384" y="416" text-anchor="middle" class="small">compressed indexes</text>
  <text x="384" y="440" text-anchor="middle" class="small">concat topk_idxs</text>

  <rect x="650" y="330" width="284" height="122" class="box kernel"/>
  <text x="792" y="364" text-anchor="middle" font-size="18" font-weight="700">sparse_attn kernel</text>
  <text x="792" y="392" text-anchor="middle" class="small">gather KV by topk_idxs</text>
  <text x="792" y="416" text-anchor="middle" class="small">online softmax</text>
  <text x="792" y="440" text-anchor="middle" class="small">attention sink</text>

  <path class="line" d="M310 188 H420"/>
  <path class="line" d="M680 178 H794"/>
  <path class="line" d="M550 236 C520 282 454 302 410 330"/>
  <path class="line" d="M919 236 C908 292 850 312 814 330"/>
  <path class="line" d="M526 392 H650"/>

  <text x="78" y="540" class="small">CSA 路径：Compressor + Indexer + top-k compressed entries。</text>
  <text x="78" y="568" class="small">HCA 路径：Compressor + all compressed entries；概念上是 dense over heavily compressed KV，工程上复用 indexed gather。</text>
</svg>
